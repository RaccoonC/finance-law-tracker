name: Update Finance Laws Data

on:
  schedule:
    # 每天台灣時間早上 7:00 執行（UTC 前一天 23:00）
    - cron: "0 23 * * *"
  workflow_dispatch: {} # 允許在 GitHub 網頁上手動點「Run workflow」測試

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Run scraper
        run: node scripts/update-laws.mjs

      - name: 抓取新聞與草案動態
        run: node scripts/check-news.mjs

      - name: 確認經費結報常見疑義問答集有無更新
        run: node scripts/check-qa.mjs

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 寄送異動通知信（若有新異動）
        # continue-on-error：Email 沒設定好，或寄信當下失敗，都不應該讓後面的
        # commit 步驟跟著失敗，資料還是要正常存檔。
        continue-on-error: true
        env:
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
        run: python scripts/send_notification.py

      - name: Commit changes if any
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/laws-data.json data/laws-fulltext.json data/news-feed.json data/qa-data.json data/qa-fulltext.json
          if git diff --cached --quiet; then
            echo "沒有更新內容"
          else
            git commit -m "chore: update finance laws data $(date -u +%Y-%m-%d)"
            git push
          fi
